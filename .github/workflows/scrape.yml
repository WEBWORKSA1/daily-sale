name: Weekly flyer scrape

on:
  schedule:
    - cron: "0 18 * * 3"   # Wednesday 2 PM ET
    - cron: "0 10 * * 4"   # Thursday 6 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run No Frills scraper (retailer-direct)
        run: python scrapers/retailers/no_frills.py --verbose
        continue-on-error: true

      - name: Run Flipp scraper (Smart Deals bridge)
        run: python scrapers/retailers/flipp.py --verbose
        continue-on-error: true

      - name: Field audit (one-time diagnostic)
        run: python scrapers/diagnostics/field_audit.py
        continue-on-error: true      
        
      - name: Commit updated prices
        run: |
          git config user.name "daily-sale-bot"
          git config user.email "bot@daily-sale.local"
          git add data/prices/latest.json scrapers/data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: flyer scrape $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed updated prices."
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scrapers/data/
          if-no-files-found: ignore
          retention-days: 7
